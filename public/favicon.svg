<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="watchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Watch Background -->
  <circle cx="16" cy="16" r="14" fill="url(#watchGradient)" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Watch Face -->
  <circle cx="16" cy="16" r="10" fill="#ffffff" opacity="0.9"/>
  
  <!-- Watch Center -->
  <circle cx="16" cy="16" r="2" fill="#0EA5E9"/>
  
  <!-- Hour Markers -->
  <rect x="15.5" y="6" width="1" height="2" fill="#0284C7" rx="0.5"/>
  <rect x="15.5" y="24" width="1" height="2" fill="#0284C7" rx="0.5"/>
  <rect x="6" y="15.5" width="2" height="1" fill="#0284C7" rx="0.5"/>
  <rect x="24" y="15.5" width="2" height="1" fill="#0284C7" rx="0.5"/>
  
  <!-- Watch Hands (showing 10:10) -->
  <rect x="15.8" y="10" width="0.4" height="6" fill="#0284C7" rx="0.2" transform="rotate(60 16 16)"/>
  <rect x="15.8" y="8" width="0.4" height="8" fill="#0EA5E9" rx="0.2" transform="rotate(120 16 16)"/>
  
  <!-- Brand Initial "M" -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#0284C7" text-anchor="middle">M</text>
</svg>
